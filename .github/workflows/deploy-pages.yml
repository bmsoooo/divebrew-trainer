name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: divebrew_trainer
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.10
          channel: stable
          cache: true

      - name: Build old version (v1.0.1)
        run: |
          git checkout 8a2bc20
          flutter pub get
          flutter build web --release --base-href "/divebrew-trainer/v1/"
          mkdir -p ../old_build_v1
          cp -R build/web/* ../old_build_v1/

      - name: Build new version (v1.1.0)
        run: |
          git checkout ${{ github.sha }}
          flutter pub get
          flutter build web --release --base-href "/divebrew-trainer/"
          mkdir -p build/web/v1
          cp -R ../old_build_v1/* build/web/v1/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: divebrew_trainer/build/web

      - id: deployment
        uses: actions/deploy-pages@v4
